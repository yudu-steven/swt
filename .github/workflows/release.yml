name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: swt.exe
            ext: .exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: swt
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: swt
            ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: swt
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} swt-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload to Release
        run: gh release upload ${{ github.ref_name }} swt-${{ matrix.target }}${{ matrix.ext }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
