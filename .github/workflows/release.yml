name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: swt.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: swt
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: swt
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: swt

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/${{ matrix.binary }} swt-${{ matrix.target }}.exe
          else
            mv target/${{ matrix.target }}/release/${{ matrix.binary }} swt-${{ matrix.target }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: swt-${{ matrix.target }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
